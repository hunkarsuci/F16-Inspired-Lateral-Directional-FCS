name: Release

on:
  push:
    tags:
      - "v*.*.*"   # triggers on tags like v0.1.0

permissions:
  contents: write   # required to create releases

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run demo (generate artifacts)
        run: |
          python scripts/run_demo.py --duration 30 --steps 5000 --fps 30 --max-frames 240

      - name: Bundle artifacts
        run: |
          mkdir -p dist
          tar -czf dist/outputs-${{ github.ref_name }}.tar.gz outputs
          if [ -d "architecture" ]; then
            tar -czf dist/architecture-${{ github.ref_name }}.tar.gz architecture
          fi

      - name: Create GitHub Release + upload assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            outputs/*.png
            outputs/*.gif
            dist/*.tar.gz
          generate_release_notes: true
